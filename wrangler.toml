name = "eplayerx-homepage"
main = "src/worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Keep the default *.workers.dev address alive.
workers_dev = true

# 👇 【你的专属域名配置，已完美替换为 epx 前缀】
routes = [
	# 拦截所有子域名 (完美覆盖 epx, tmdb, 以及未来你随便乱造的任何前缀)
	{ pattern = "*.ikuu.eu.org/*", zone_name = "ikuu.eu.org" },
	{ pattern = "*.ikuux.cyou/*", zone_name = "ikuux.cyou" },

	# 拦截根域名 (为了兼容原代码里的 ikuu.eu.org/blocks* 路径)
	{ pattern = "ikuu.eu.org/*", zone_name = "ikuu.eu.org" },
	{ pattern = "ikuux.cyou/*", zone_name = "ikuux.cyou" },
]

[observability]
enabled = true

# D1 database configuration
[[d1_databases]]
binding = "DB"
database_name = "blocks"
# 🔴 请务必把下面的中文替换成你的 D1 数据库 ID！
database_id = "c3a09032-48ce-471c-a0cb-0b91a170103c"
migrations_dir = "migrations"

# R2 bucket configuration
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "crawler"
