name = "eplayerx-homepage"
main = "src/worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Keep the default *.workers.dev address alive.
workers_dev = true

# 👇 【你的专属域名配置，已完美替换为 epx 前缀】
routes = [
	# ---------------- 第一组：ikuu.eu.org ----------------
	{ pattern = "api.ikuu.eu.org", custom_domain = true },
	{ pattern = "tmdb.ikuu.eu.org", custom_domain = true },
	{ pattern = "ikuu.eu.org/blocks*", zone_name = "ikuu.eu.org" },

	# ---------------- 第二组：ikuux.cyou ----------------
	{ pattern = "api.ikuux.cyou", custom_domain = true },
	{ pattern = "tmdb.ikuux.cyou", custom_domain = true },
	{ pattern = "ikuux.cyou/blocks*", zone_name = "ikuux.cyou" },
]

[observability]
enabled = true

# D1 database configuration
[[d1_databases]]
binding = "DB"
database_name = "blocks"
# 🔴 请务必把下面的中文替换成你的 D1 数据库 ID！
database_id = "c3a09032-48ce-471c-a0cb-0b91a170103c"
migrations_dir = "migrations"

# R2 bucket configuration
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "crawler"
